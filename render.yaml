services:
  - type: web
    name: okajun-keiba-shutuba
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: PYTHON_VERSION
        value: 3.12.8
